# =============================================================================
# Docker Compose Override for No-Auth Mode
# Use with: docker-compose -f docker-compose.yml -f docker-compose.no-auth.yml up
# =============================================================================

version: '3.8'

services:
  # -----------------------------------------------------------------------------
  # Override main service for no-auth mode
  # -----------------------------------------------------------------------------
  private_gpt-api:
    environment:
      # Enable no-auth mode for development/demos
      # Note: These environment variables may not be fully supported by the server yet
      # Server currently defaults to no authentication
      - WEBSCOUT_LOG_LEVEL=debug
      - WEBSCOUT_DEBUG=true
      - WEBSCOUT_REQUEST_LOGGING=true
      # FastAPI metadata
      - WEBSCOUT_API_TITLE=Private_GPT OpenAI API
      - WEBSCOUT_API_DESCRIPTION=OpenAI API compatible interface for various LLM providers with enhanced authentication
      - WEBSCOUT_API_VERSION=0.2.0
      - WEBSCOUT_API_DOCS_URL=/docs
      - WEBSCOUT_API_REDOC_URL=/redoc
      - WEBSCOUT_API_OPENAPI_URL=/openapi.json

    # Add labels for easy identification
    labels:
      - "private_gpt.mode=no-auth"
      - "private_gpt.description=No authentication required - development/demo mode"

  # -----------------------------------------------------------------------------
  # Override production service for no-auth mode (not recommended)
  # -----------------------------------------------------------------------------
  private_gpt-api-production:
    environment:
      # WARNING: Only use no-auth in production if you understand the security implications
      # Note: These environment variables may not be fully supported by the server yet
      - WEBSCOUT_LOG_LEVEL=info
      - WEBSCOUT_REQUEST_LOGGING=true

    labels:
      - "private_gpt.mode=no-auth-production"
      - "private_gpt.warning=No authentication - use with caution in production"

  # -----------------------------------------------------------------------------
  # Override development service for no-auth mode
  # -----------------------------------------------------------------------------
  private_gpt-api-dev:
    environment:
      # Perfect for development
      # Note: Authentication settings may not be fully supported by the server yet
      - WEBSCOUT_LOG_LEVEL=debug
      - WEBSCOUT_DEBUG=true
      - WEBSCOUT_REQUEST_LOGGING=true

    labels:
      - "private_gpt.mode=no-auth-dev"
      - "private_gpt.description=Development mode with no authentication"
